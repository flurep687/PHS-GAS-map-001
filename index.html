<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Sarabun',Arial,sans-serif;overflow:hidden;background:#040c18;color:#e2e8f0}

/* ── TOPBAR ── */
#bar{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:rgba(4,12,26,0.97);
  border-bottom:1px solid rgba(96,165,250,0.15);
  padding:6px 12px 5px;
}
.bar-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:2px 0}
.bar-row+.bar-row{border-top:1px solid rgba(255,255,255,0.05);margin-top:3px;padding-top:5px}
.blabel{font-size:9px;color:#334155;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;padding:0 2px;flex-shrink:0}
h1{font-size:15px;font-weight:800;white-space:nowrap;
  background:linear-gradient(90deg,#38bdf8,#818cf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-right:2px}

/* brand btn */
.fb{padding:4px 10px;border-radius:7px;border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);color:#64748b;
  font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.fb:hover{background:rgba(255,255,255,0.1);color:#e2e8f0}
.fb.on{border-color:var(--c);background:rgba(var(--cr),0.13);color:var(--c)}

/* fuel btn */
.ff{display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:7px;border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.04);color:#64748b;
  font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.ff:hover{background:rgba(255,255,255,0.1);color:#e2e8f0}
.ff.on{border-color:var(--fc);background:rgba(var(--fr),0.14);color:var(--fc)}
.fdot-sm{width:8px;height:8px;border-radius:50%;background:var(--fc);flex-shrink:0}
.ff-ev.on{border-color:#a78bfa;background:rgba(167,139,250,0.13);color:#a78bfa}
.ff-clr{color:#64748b}
.ff-clr:hover{color:#f87171;border-color:rgba(248,113,113,0.3)}

#cnt{font-size:10px;color:#334155;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);border-radius:6px;padding:3px 8px;white-space:nowrap;margin-left:auto}

/* ── MAP ── */
#map{position:fixed;left:0;right:0;bottom:0;top:80px}

/* ── LEGEND ── */
#leg{position:fixed;bottom:26px;left:10px;z-index:999;
  background:rgba(4,12,26,0.95);border:1px solid rgba(96,165,250,0.12);
  border-radius:12px;padding:11px 13px;min-width:168px;
  box-shadow:0 4px 20px rgba(0,0,0,.5)}
.lt{font-size:8px;color:#334155;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px}
.lr{display:flex;align-items:center;gap:7px;margin-bottom:5px;cursor:pointer;
  border-radius:6px;padding:2px 4px;transition:background .15s}
.lr:hover{background:rgba(255,255,255,0.05)}
.ld{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.ln{font-size:11px;font-weight:700}.lsub{font-size:9px;color:#475569;margin-left:2px}
.lhr{height:1px;background:rgba(255,255,255,0.06);margin:7px 0}
.lf{display:flex;align-items:center;gap:6px;margin-bottom:4px;cursor:pointer;
  border-radius:5px;padding:2px 4px;transition:background .15s}
.lf:hover{background:rgba(255,255,255,0.05)}
.lfd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.lfn{font-size:10px;color:#94a3b8;transition:color .15s}
.lf.on .lfn{color:#e2e8f0;font-weight:700}
.lf.on .lfd{box-shadow:0 0 6px currentColor}

/* ── POPUP ── */
.leaflet-popup-content-wrapper{
  background:rgba(5,14,30,0.98)!important;border:1px solid rgba(96,165,250,0.15)!important;
  border-radius:12px!important;box-shadow:0 8px 32px rgba(0,0,0,.7)!important;padding:0!important}
.leaflet-popup-content{margin:0!important;min-width:230px;max-width:280px}
.leaflet-popup-tip{background:rgba(5,14,30,0.98)!important}
.leaflet-popup-close-button{color:#475569!important;top:8px!important;right:10px!important;font-size:16px!important}
.pu{padding:14px 16px}
.pub{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px}
.pun{font-size:15px;font-weight:800;color:#e2e8f0;line-height:1.2;margin-bottom:3px}
.pua{font-size:10px;color:#475569;margin-bottom:7px}
.pum{display:flex;gap:12px;font-size:11px;color:#64748b;margin-bottom:8px;flex-wrap:wrap}
.puf{display:flex;flex-wrap:wrap;gap:3px}
.fc{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:16px;font-size:10px;font-weight:700;margin:2px;transition:box-shadow .2s,transform .2s}
.fc.hi{transform:scale(1.08)}
.evc{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:16px;
  background:rgba(124,58,237,.12);border:1.5px solid rgba(167,139,250,.35);
  color:#a78bfa;font-size:10px;font-weight:700;margin:2px}
.evc.hi{box-shadow:0 0 8px rgba(167,139,250,0.5);transform:scale(1.08)}
.gmlink{display:block;margin-top:8px;padding:6px;border-radius:8px;text-align:center;
  background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);
  color:#38bdf8;font-size:11px;font-weight:700;text-decoration:none;transition:background .15s}
.gmlink:hover{background:rgba(56,189,248,0.18)}

/* ── MARKER ── */
.mi{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:800;color:#fff;border:2.5px solid;
  box-shadow:0 2px 12px rgba(0,0,0,.6);position:relative;cursor:pointer;transition:transform .15s,opacity .2s,box-shadow .2s}
.mi:hover{transform:scale(1.18)}
.mi.dim{opacity:0.2}
.mi.match{box-shadow:0 0 14px 3px rgba(255,255,255,0.25),0 2px 12px rgba(0,0,0,.6)}
.fdots{position:absolute;top:-9px;left:50%;transform:translateX(-50%);display:flex;gap:2px}
.fdot{width:6px;height:6px;border-radius:50%;border:1px solid rgba(0,0,0,.4);transition:transform .15s,box-shadow .15s}
.fdot.hi{transform:scale(1.5);box-shadow:0 0 5px rgba(255,255,255,0.8)}
.evbg{position:absolute;top:-5px;right:-5px;width:13px;height:13px;border-radius:50%;
  background:#581c87;border:1.5px solid #a855f7;font-size:7px;
  display:flex;align-items:center;justify-content:center;color:#e9d5ff}
.rlab{background:transparent!important;border:none!important;box-shadow:none!important;
  color:rgba(56,189,248,.5);font-size:10px;font-family:'Sarabun',Arial,sans-serif;pointer-events:none}
.rlab::before{display:none!important}

/* ── NO RESULT ── */
#nores{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2000;
  background:rgba(5,14,30,0.96);border:1px solid rgba(239,68,68,0.25);

  box-shadow:0 8px 32px rgba(0,0,0,.6);pointer-events:none}
#nores .ni{font-size:32px;margin-bottom:6px}
#nores .nm{font-size:14px;font-weight:800;color:#e2e8f0;margin-bottom:3px}
#nores .nd{font-size:11px;color:#64748b}
</style>

  {br:"Bangchak",nm:"Bangchak พญาเสือ",  la:16.8259,ln:100.2688,fu:["D","95","91"],ev:1,h:"24 ชั่วโมง",r:4.4,ad:"ถ.พญาเสือ",         gm:"https://maps.google.com/?cid=4973144057051639559"},
  {br:"Bangchak",nm:"Bangchak บรมไตรโลกนาถ",la:16.8027,ln:100.2505,fu:["D","95","91"],ev:0,h:"24 ชั่วโมง",r:4.4,ad:"ถ.บรมไตรโลกนาถ",gm:"https://maps.google.com/?cid=14365035122346418216"},
  {br:"Bangchak",nm:"Bangchak M.T.S.P.", la:16.8116,ln:100.2611,fu:["D","95","91"],ev:0,h:"04:00–22:00",r:4.2,ad:"ถ.บรมไตรโลกนาถ",  gm:"https://maps.google.com/?cid=10607919134011782522"},
  {br:"Caltex",nm:"Caltex ไผ่ชุมแสง",   la:16.8433,ln:100.2314,fu:["D","95","91"],ev:0,h:"05:00–22:00",r:4.1,ad:"ต.ไผ่ชุมแสง",      gm:"https://maps.google.com/?cid=12476260579288963999"},
  {br:"Caltex",nm:"Caltex บ้านกร่าง",   la:16.8679,ln:100.2111,fu:["D","95","91"],ev:0,h:"06:00–18:00",r:4.5,ad:"ต.บ้านกร่าง",      gm:"https://maps.google.com/?cid=7176090918405240969"},
];

/* ─── STATE ─── */
var curBrand = 'ALL';
var curFuels = [];   // multi-select fuel list

/* ─── MAP ─── */
function setMapTop(){
  document.getElementById('map').style.top = document.getElementById('bar').offsetHeight+'px';
}
window.addEventListener('resize', setMapTop);

var map = L.map('map',{center:[16.810,100.266],zoom:13,zoomControl:false});
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OSM &copy; CARTO',subdomains:'abcd',maxZoom:19
}).addTo(map);
L.circle([16.820,100.266],{radius:15000,color:'#60a5fa',opacity:.25,weight:1.5,fill:true,fillColor:'#60a5fa',fillOpacity:.03,dashArray:'8 6'}).addTo(map);
L.circleMarker([16.820,100.266],{radius:6,color:'#38bdf8',fillColor:'#38bdf8',fillOpacity:.9,weight:2})
  .bindTooltip('ใจกลางเมืองพิษณุโลก',{permanent:false,direction:'right',offset:[8,0],className:'rlab'}).addTo(map);

/* ─── MARKERS ─── */
var mkrs=[];

function buildIcon(s, activeFuels){
  var bc=B[s.br];
  var hasFuelMatch = activeFuels.length>0;
  var dots=s.fu.slice(0,3).map(function(f){
    var hi=hasFuelMatch && activeFuels.indexOf(f)>=0;
    return '<div class="fdot'+(hi?' hi':'')+'" style="background:'+FC[f]+'"></div>';
  }).join('');
  var ev=s.ev?'<div class="evbg">⚡</div>':'';
  var dimClass = (!stationMatches(s) ? ' dim' : (hasFuelMatch ? ' match' : ''));
  return L.divIcon({
    className:'',
    html:'<div class="mi'+dimClass+'" style="background:'+bc.bg+';border-color:'+bc.bo+'">'
        +'<div class="fdots">'+dots+'</div>'+bc.tx+ev+'</div>',
    iconSize:[32,32],iconAnchor:[16,28],popupAnchor:[0,-28]
  });
}

function buildPopup(s, activeFuels){
  var bc=B[s.br];
  var stars='★'.repeat(Math.round(s.r))+'☆'.repeat(5-Math.round(s.r));
  var chips=s.fu.map(function(f){
    var hi=activeFuels.length>0 && activeFuels.indexOf(f)>=0;
    return '<span class="fc'+(hi?' hi':'')+'" style="background:'+FC[f]+'18;border:1.5px solid '+FC[f]+(hi?'cc':'44')+';color:'+FC[f]+(hi?';box-shadow:0 0 8px rgba('+FCR[f]+',.5)':'')+'">'
          +'<span style="width:6px;height:6px;border-radius:50%;background:'+FC[f]+';display:inline-block"></span>'
          +FL[f]+'</span>';
  }).join('');
  var evHi=activeFuels.indexOf('EV')>=0;
  var evb=s.ev?'<span class="evc'+(evHi?' hi':'')+'">⚡ EV Charging</span>':'';
  return '<div class="pu">'
    +'<div class="pub" style="color:'+bc.co+'">'+s.br+'</div>'
    +'<div class="pun">'+s.nm+'</div>'
    +'<div class="pua">📍 '+s.ad+'</div>'
    +'<div class="pum"><span>🕐 '+s.h+'</span><span style="color:#fbbf24">'+stars+' '+s.r+'</span></div>'
    +'<div class="puf">'+chips+evb+'</div>'
    +'<a class="gmlink" href="'+s.gm+'" target="_blank" rel="noopener">🗺 เปิดใน Google Maps</a>'
    +'</div>';
}

ST.forEach(function(s){
  var m=L.marker([s.la,s.ln],{icon:buildIcon(s,[]),title:s.nm,riseOnHover:true})
    .bindPopup(buildPopup(s,[]),{maxWidth:290,minWidth:230});
  m._s=s; m.addTo(map); mkrs.push(m);
});

/* ─── MATCH CHECK ─── */
function stationMatches(s){
  if(curBrand!=='ALL' && s.br!==curBrand) return false;
  if(curFuels.length>0){
    for(var i=0;i<curFuels.length;i++){
      var f=curFuels[i];
      if(f==='EV'){ if(!s.ev) return false; }
      else         { if(s.fu.indexOf(f)<0) return false; }
    }
  }
  return true;
}

/* ─── APPLY ─── */
function applyFilters(){
  var n=0;
  mkrs.forEach(function(m){
    var s=m._s, ok=stationMatches(s);
    m.setIcon(buildIcon(s, curFuels));
    m.setPopupContent(buildPopup(s, curFuels));
    if(ok){ if(!map.hasLayer(m)) map.addLayer(m); n++; }
    else  { if(map.hasLayer(m))  map.removeLayer(m); }
  });
  document.getElementById('cnt').textContent = n+' สาขา';
  document.getElementById('nores').style.display = (n===0)?'block':'none';
  // legend sync
  ['D','95','91','E20','E85','EV'].forEach(function(f){
    var el=document.getElementById('lf-'+f);
    if(el) el.classList.toggle('on', curFuels.indexOf(f)>=0);
  });
}

/* ─── BRAND FILTER ─── */
function setBrand(b){
  curBrand=b;
  document.querySelectorAll('[id^="fb-"]').forEach(function(el){el.classList.remove('on')});
  document.getElementById('fb-'+b).classList.add('on');
  applyFilters();
}

/* ─── FUEL FILTER ─── */
function toggleFuel(f){
  var i=curFuels.indexOf(f);
  if(i>=0) curFuels.splice(i,1);
  else curFuels.push(f);
  var btn=document.getElementById('ff-'+f);
  if(btn) btn.classList.toggle('on', curFuels.indexOf(f)>=0);
  applyFilters();
}

function clearFuels(){
  curFuels=[];
  ['D','95','91','E20','E85','EV'].forEach(function(f){
    var btn=document.getElementById('ff-'+f);
    if(btn) btn.classList.remove('on');
  });
  applyFilters();
}

setTimeout(setMapTop, 80);
</script>
</body>
